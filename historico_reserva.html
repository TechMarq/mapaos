<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <!-- Favicon & PWA App Features -->
    <link rel="icon" type="image/png" href="img/mapaos-logo-sf.png?v=2">
    <link rel="apple-touch-icon" sizes="180x180" href="img/mapaos-logo-sf.png?v=2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>Mapa.OS - Histórico de Reservas</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #171f33, #0b1326);
            min-height: 100vh;
            color: #dae2fd;
            overflow-x: hidden;
        }

        .glass-card {
            backdrop-filter: blur(24px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-card-hover:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.05));
            border: 1px solid rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
    </style>
    <!-- Tailwind Config Verbatim -->
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#4b8eff",
                        "on-tertiary-fixed-variant": "#92040d",
                        "on-tertiary": "#690005",
                        "on-background": "#dae2fd",
                        "surface-tint": "#adc6ff",
                        "primary": "#adc6ff",
                        "surface": "#0b1326",
                        "on-secondary": "#003828",
                        "inverse-surface": "#dae2fd",
                        "on-primary-fixed-variant": "#004493",
                        "on-tertiary-fixed": "#410002",
                        "inverse-primary": "#005bc1",
                        "tertiary": "#ffb4ab",
                        "surface-container": "#171f33",
                        "tertiary-container": "#fb584e",
                        "primary-fixed": "#d8e2ff",
                        "on-secondary-fixed-variant": "#00513c",
                        "secondary-fixed": "#50fdc7",
                        "surface-container-highest": "#2d3449",
                        "on-secondary-container": "#005841",
                        "surface-variant": "#2d3449",
                        "surface-bright": "#31394d",
                        "secondary-fixed-dim": "#1ee0ac",
                        "on-error-container": "#ffdad6",
                        "primary-fixed-dim": "#adc6ff",
                        "on-primary": "#002e69",
                        "on-primary-container": "#00285c",
                        "on-surface-variant": "#c1c6d7",
                        "tertiary-fixed-dim": "#ffb4ab",
                        "error": "#ffb4ab",
                        "secondary": "#44f5be",
                        "inverse-on-surface": "#283044",
                        "tertiary-fixed": "#ffdad6",
                        "on-error": "#690005",
                        "on-tertiary-container": "#5c0004",
                        "surface-container-high": "#222a3d",
                        "outline": "#8b90a0",
                        "error-container": "#93000a",
                        "secondary-container": "#00d8a4",
                        "on-primary-fixed": "#001a41",
                        "background": "#0b1326",
                        "outline-variant": "#414755",
                        "surface-container-low": "#131b2e",
                        "surface-dim": "#0b1326",
                        "on-secondary-fixed": "#002116",
                        "surface-container-lowest": "#060e20",
                        "on-surface": "#dae2fd"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap-sm": "12px",
                        "gutter": "16px",
                        "container-padding-mobile": "20px",
                        "unit": "8px",
                        "stack-gap-md": "24px",
                        "container-padding-desktop": "40px",
                        "stack-gap-lg": "48px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "display-xl": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["13px", { "lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "display-xl": ["64px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "letterSpacing": "-0.01em", "fontWeight": "400" }]
                    }
                },
            },
        }
    </script>
</head>

<body class="pb-32">
    <!-- Atmospheric Shader Background -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">

    </div>
    <!-- Top AppBar (from JSON) -->
    <div id="top-app-bar"></div>
    <main class="container-padding-mobile pt-24 px-4 md:px-10 max-w-5xl mx-auto">
        <!-- Headline Section -->
        <div class="mb-stack-gap-md">
            <h2
                class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface">
                Histórico de Reservas</h2>
            <p class="font-body-md text-on-surface-variant/70 mt-1">Gerencie suas ordens de serviço e pagamentos.</p>
        </div>
        <!-- Filters Section -->
        <section class="flex flex-col md:flex-row gap-4 mb-stack-gap-md">
            <div class="flex-1 flex gap-2 overflow-x-auto scrollbar-hide">
                <button
                    class="px-5 py-2 glass-card rounded-full text-label-sm font-label-sm border-primary/40 text-primary flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm" data-icon="calendar_month">calendar_month</span>
                    Agosto
                </button>
                <button
                    class="px-5 py-2 glass-card rounded-full text-label-sm font-label-sm text-on-surface-variant/80 hover:text-primary transition-colors flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm" data-icon="filter_list">filter_list</span>
                    Todos Status
                </button>
                <button
                    class="px-5 py-2 glass-card rounded-full text-label-sm font-label-sm text-on-surface-variant/80 hover:text-primary transition-colors">
                    Esta Semana
                </button>
                <button id="btn-reconciliation" class="px-5 py-2 glass-card rounded-full text-label-sm font-label-sm text-secondary hover:bg-secondary/10 hover:border-secondary/30 transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">account_balance</span>
                    Conciliação
                </button>
            </div>
            <div class="glass-card flex items-center px-4 py-2 rounded-xl border-white/10 w-full md:w-64">
                <span class="material-symbols-outlined text-on-surface-variant mr-2" data-icon="search">search</span>
                <input
                    class="bg-transparent border-none focus:ring-0 text-sm text-on-surface w-full p-0 placeholder:text-on-surface-variant/50"
                    placeholder="Buscar OS ou cliente..." type="text">
            </div>
        </section>
        <!-- Reservations List -->
        <div id="reservations-list-container" class="space-y-4"></div>
        <!-- Pagination/Load More -->
        <div class="mt-stack-gap-md text-center">
            <button
                class="px-8 py-3 glass-card rounded-xl text-on-surface font-semibold hover:bg-white/10 transition-all">
                Ver reservas de Julho
            </button>
        </div>
    </main>
    <!-- Bottom Navigation Bar (from JSON) -->
    <div id="bottom-nav-bar"></div>
    <!-- Reconciliation Modal -->
    <div id="reconciliation-modal" class="fixed inset-0 z-[9998] flex items-center justify-center bg-[#060e20]/80 backdrop-blur-md opacity-0 pointer-events-none transition-all duration-300">
        <div class="glass-card w-[90%] max-w-[480px] p-6 md:p-8 rounded-2xl flex flex-col gap-6 transform scale-95 transition-all duration-300 border-t-white/20">
            <div class="flex justify-between items-start">
                <div>
                    <h3 class="font-headline-lg-mobile text-headline-lg-mobile text-secondary">Conciliação Bancária</h3>
                    <p class="text-on-surface-variant text-sm mt-1">Faça upload do arquivo de extrato para conciliar as reservas pendentes.</p>
                </div>
                <button id="close-reconciliation-modal" class="text-on-surface-variant hover:text-on-surface hover:bg-white/10 p-2 rounded-full transition-colors flex items-center justify-center">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            
            <div id="drop-zone" class="border-2 border-dashed border-white/20 hover:border-secondary/40 rounded-xl p-8 flex flex-col items-center justify-center gap-3 cursor-pointer transition-colors bg-white/5">
                <span class="material-symbols-outlined text-4xl text-secondary">cloud_upload</span>
                <p id="file-info-text" class="text-on-surface text-sm font-medium text-center">Arraste seu arquivo (CSV/XLSX) ou clique para procurar</p>
                <input type="file" id="reconciliation-file-input" class="hidden" accept=".csv,.xlsx,.xls" />
            </div>

            <!-- CTA Submit Button -->
            <button id="btn-reconciliation-submit" class="primary-glow bg-gradient-to-r from-secondary-fixed-dim to-secondary-container text-surface font-bold h-12 rounded-xl active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-unit opacity-50 pointer-events-none">
                <span>Processar Conciliação</span>
                <span class="material-symbols-outlined text-lg">sync</span>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.env.js"></script>
    <script src="supabase.js"></script>
    <script src="navigation.js"></script>
    <!-- Micro-interactions Script -->
    <script>
        document.querySelectorAll('.glass-card-hover').forEach(card => {
            card.addEventListener('mousedown', () => {
                card.style.transform = 'scale(0.98)';
            });
            card.addEventListener('mouseup', () => {
                card.style.transform = 'translateY(-2px) scale(1)';
            });
        });

        // Render reservations dynamically from database helper
        async function loadAndRenderReservations() {
            const container = document.getElementById('reservations-list-container');
            if (!container) return;

            const reservations = await dbGetReservations();
            container.innerHTML = '';

            reservations.forEach((item, index) => {
                const isPaid = item.status === 'Paga';
                const borderBg = isPaid ? 'bg-secondary' : 'bg-orange-400';
                const iconWrapperColor = isPaid 
                    ? 'bg-secondary/10 text-secondary border-secondary/20' 
                    : 'bg-orange-400/10 text-orange-400 border-orange-400/20';
                const badgeColor = isPaid 
                    ? 'bg-secondary/20 text-secondary' 
                    : 'bg-orange-400/20 text-orange-400';
                const iconName = isPaid ? 'receipt_long' : 'pending_actions';
                const valueColor = isPaid ? 'text-secondary font-bold text-xl' : 'text-on-surface font-semibold text-xl opacity-80';
                const subtext = isPaid ? 'Via Extrato • Conciliado' : 'Aguardando Confirmação';
                
                // Format date string from DD/MM/AAAA or similar
                let formattedDate = item.date;
                if (item.date && item.date.includes('/')) {
                    const parts = item.date.split('/');
                    if (parts.length === 3) {
                        const dateObj = new Date(`${parts[2]}-${parts[1]}-${parts[0]}T00:00:00`);
                        const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
                        formattedDate = `${dateObj.getDate()} de ${months[dateObj.getMonth()]} de ${dateObj.getFullYear()}`;
                    }
                }

                const itemHTML = `
                    <div class="glass-card glass-card-hover p-5 rounded-2xl relative overflow-hidden group"
                        style="opacity: 0; transform: translateY(20px); transition: all 0.5s ease-out;">
                        <div class="absolute top-0 left-0 w-1 h-full ${borderBg}"></div>
                        <div class="flex flex-col md:flex-row justify-between md:items-center gap-4">
                            <div class="flex gap-4 items-center">
                                <div class="w-12 h-12 rounded-xl ${iconWrapperColor} flex items-center justify-center border">
                                    <span class="material-symbols-outlined" data-icon="${iconName}">${iconName}</span>
                                </div>
                                <div>
                                    <div class="flex items-center gap-2">
                                        <span class="font-label-sm text-on-surface-variant text-xs opacity-60">OS #${item.os_number}</span>
                                        <span class="px-2 py-0.5 rounded-md ${badgeColor} text-[10px] font-bold uppercase tracking-wider">${item.status}</span>
                                    </div>
                                    <h3 class="font-headline-lg-mobile text-lg text-on-surface">${item.client_name}</h3>
                                    <p class="font-body-md text-sm text-on-surface-variant">${formattedDate} • ${item.time}</p>
                                </div>
                            </div>
                            <div class="flex items-center justify-between md:flex-col md:items-end md:gap-1 border-t border-white/5 pt-4 md:pt-0 md:border-none">
                                <span class="font-label-sm text-on-surface-variant text-xs md:hidden">Valor Total</span>
                                <div class="text-right">
                                    <span class="${valueColor}">R$ ${item.value || '—'}</span>
                                    <p class="text-[10px] text-on-surface-variant/50 hidden md:block">${subtext}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', itemHTML);
                
                // Fade in animation
                const card = container.lastElementChild;
                setTimeout(() => {
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, 100 * index);

                // Add active-scale interactions
                card.addEventListener('mousedown', () => {
                    card.style.transform = 'scale(0.98)';
                });
                card.addEventListener('mouseup', () => {
                    card.style.transform = 'translateY(0) scale(1)';
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadAndRenderReservations();
        });

        // Reconciliation Modal Behavior
        const reconModal = document.getElementById('reconciliation-modal');
        const reconBtn = document.getElementById('btn-reconciliation');
        const closeReconBtn = document.getElementById('close-reconciliation-modal');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('reconciliation-file-input');
        const fileText = document.getElementById('file-info-text');
        const submitReconBtn = document.getElementById('btn-reconciliation-submit');

        function openReconModal() {
            if (reconModal) {
                reconModal.style.display = 'flex';
                reconModal.offsetHeight;
                reconModal.classList.remove('opacity-0', 'pointer-events-none');
                const inner = reconModal.querySelector('.glass-card');
                if (inner) {
                    inner.classList.remove('scale-95');
                    inner.classList.add('scale-100');
                }
            }
        }

        function closeReconModal() {
            if (reconModal) {
                reconModal.classList.add('opacity-0', 'pointer-events-none');
                const inner = reconModal.querySelector('.glass-card');
                if (inner) {
                    inner.classList.remove('scale-100');
                    inner.classList.add('scale-95');
                }
                setTimeout(() => {
                    reconModal.style.display = 'none';
                    if (fileInput) fileInput.value = '';
                    if (fileText) fileText.innerText = 'Arraste seu arquivo (CSV/XLSX) ou clique para procurar';
                    if (submitReconBtn) submitReconBtn.classList.add('opacity-50', 'pointer-events-none');
                }, 300);
            }
        }

        if (reconBtn) reconBtn.addEventListener('click', openReconModal);
        if (closeReconBtn) closeReconBtn.addEventListener('click', closeReconModal);

        if (reconModal) {
            reconModal.addEventListener('click', (e) => {
                if (e.target === reconModal) closeReconModal();
            });
        }

        // File Selection handling
        if (dropZone) {
            dropZone.addEventListener('click', () => fileInput.click());
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('border-secondary/60', 'bg-white/10');
            });
            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('border-secondary/60', 'bg-white/10');
            });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('border-secondary/60', 'bg-white/10');
                if (e.dataTransfer.files.length) {
                    handleFileSelect(e.dataTransfer.files[0]);
                }
            });
        }

        if (fileInput) {
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length) {
                    handleFileSelect(e.target.files[0]);
                }
            });
        }

        function handleFileSelect(file) {
            if (fileText) fileText.innerText = `Arquivo: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
            if (submitReconBtn) submitReconBtn.classList.remove('opacity-50', 'pointer-events-none');
        }

        // Process reconciliation simulation
        if (submitReconBtn) {
            submitReconBtn.addEventListener('click', () => {
                const originalText = submitReconBtn.innerHTML;
                submitReconBtn.innerHTML = `
                    <svg class="animate-spin h-5 w-5 text-surface" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span class="ml-2 text-surface">Conciliando...</span>
                `;

                setTimeout(() => {
                    closeReconModal();
                    
                    const loader = document.getElementById('global-loader');
                    if (loader) {
                        loader.style.display = 'flex';
                        loader.offsetHeight;
                        loader.classList.remove('opacity-0', 'pointer-events-none');
                    }

                    setTimeout(() => {
                        if (loader) {
                            loader.classList.add('opacity-0', 'pointer-events-none');
                            setTimeout(() => loader.style.display = 'none', 500);
                        }
                        submitReconBtn.innerHTML = originalText;

                        // Execute Reconciliation in Supabase / mock LocalStorage DB
                        dbReconcileReservations().then(reconciledCount => {
                            loadAndRenderReservations();
                            alert(`${reconciledCount} reservas pendentes foram conciliadas com sucesso!`);
                        });
                    }, 1500);
                }, 1000);
            });
        }
    </script>
</body>

</html>
