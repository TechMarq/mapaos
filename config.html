                        "on-error-container": "#ffdad6",

                        "on-surface-variant": "#c1c6d7",
                        "primary-fixed": "#d8e2ff",
                        "surface-container": "#171f33",
                        "surface-container-high": "#222a3d",
                        "secondary-fixed": "#50fdc7",
                        "error-container": "#93000a",

    <style>
        body {
            background: linear-gradient(180deg, #0b1326 0%, #171f33 100%);
            min-height: 100vh;
            background-attachment: fixed;
        }

        .ambient-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(75, 142, 255, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .glass-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.15);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: theme('colors.primary');
            box-shadow: 0 0 15px rgba(173, 198, 255, 0.2);
            outline: none;
        }

        .ios-toggle {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 30px;
        }

        .ios-toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        input:checked+.slider {
            background-color: theme('colors.secondary-container');
            border-color: theme('colors.secondary-container');
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, theme('colors.primary-container'), theme('colors.primary'));
            box-shadow: 0 4px 15px rgba(75, 142, 255, 0.3);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="text-on-background min-h-screen pb-32">
    <div class="ambient-glow"></div>
    <!-- TopAppBar -->
    <div id="top-app-bar"></div>
    <!-- Main Content -->
    <main class="pt-32 px-container-padding-mobile md:px-container-padding-desktop max-w-5xl mx-auto space-y-stack-gap-md md:space-y-stack-gap-lg">
        <div class="mb-8">
            <h2 class="font-display-xl text-display-xl text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary-fixed-dim mb-2">Ajustes</h2>
            <p class="font-body-md text-body-md text-on-surface-variant">Gerencie seu perfil e preferências de exibição.</p>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-12 gap-stack-gap-md">
            <!-- Left Column: User Profile -->
            <div class="md:col-span-7 space-y-stack-gap-md">
                <!-- Profile Section -->
                <section class="glass-card rounded-xl p-6 md:p-8">
                    <h3 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-6 flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">person</span> Meu Perfil
                    </h3>
                    <div class="flex flex-col md:flex-row gap-8 items-start mb-6">
                        <div class="relative group mx-auto md:mx-0">
                            <div class="w-24 h-24 rounded-full overflow-hidden border-2 border-primary/50 shadow-lg shadow-primary/20 flex items-center justify-center bg-white/5">
                                <span class="material-symbols-outlined text-primary text-5xl">account_circle</span>
                            </div>
                        </div>
                        <div class="flex-1 w-full space-y-4">
                            <div>
                                <label class="block font-label-sm text-label-sm text-on-surface-variant mb-2">Nome Completo</label>
                                <input id="profile-name-input" class="glass-input w-full rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface" type="text" placeholder="Carregando...">
                            </div>
                            <div>
                                <label class="block font-label-sm text-label-sm text-on-surface-variant mb-2">Contato (Telefone)</label>
                                <input id="profile-phone-input" class="glass-input w-full rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface" type="tel" placeholder="Carregando...">
                            </div>
                            <div>
                                <label class="block font-label-sm text-label-sm text-on-surface-variant mb-2">E-mail (Não editável)</label>
                                <input id="profile-email-input" class="glass-input w-full rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface opacity-50 cursor-not-allowed" type="email" disabled readonly>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block font-label-sm text-label-sm text-on-surface-variant mb-2">Nível de Acesso</label>
                                    <input id="profile-role-input" class="glass-input w-full rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface opacity-50 cursor-not-allowed" type="text" disabled readonly>
                                </div>
                                <div>
                                    <label class="block font-label-sm text-label-sm text-on-surface-variant mb-2">Status da Conta</label>
                                    <input id="profile-status-input" class="glass-input w-full rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface opacity-50 cursor-not-allowed" type="text" disabled readonly>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-end border-t border-white/10 pt-4 mt-6">
                        <button id="btn-save-profile" class="btn-primary font-label-sm text-label-sm text-on-primary px-6 py-2.5 rounded-full transition-transform active:scale-95 flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm">save</span> Salvar Alterações
                        </button>
                    </div>
                </section>
            </div>
            
            <!-- Right Column: Preferences & Master panel -->
            <div class="md:col-span-5 space-y-stack-gap-md">
                <!-- Appearance Section -->
                <section class="glass-card rounded-xl p-6 md:p-8">
                    <h3 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-6 flex items-center gap-2">
                        <span class="material-symbols-outlined text-tertiary-fixed-dim">tune</span> Preferências
                    </h3>
                    <div class="space-y-4">
                        <h4 class="font-label-sm text-label-sm text-primary uppercase tracking-wider">APARÊNCIA</h4>
                        <div class="grid grid-cols-2 gap-4">
                            <button class="glass-input rounded-lg py-4 flex flex-col items-center gap-2 border-primary bg-white/10">
                                <span class="material-symbols-outlined text-on-surface">dark_mode</span>
                                <span class="font-label-sm text-label-sm text-on-surface">Escuro</span>
                            </button>
                            <button class="glass-input rounded-lg py-4 flex flex-col items-center gap-2 opacity-50 hover:opacity-100">
                                <span class="material-symbols-outlined text-on-surface">light_mode</span>
                                <span class="font-label-sm text-label-sm text-on-surface">Claro</span>
                            </button>
                        </div>
                    </div>
                </section>

                <!-- Admin Card (Shown conditionally) -->
                <section id="master-panel-card" class="glass-card rounded-xl p-6 md:p-8 border-primary/20 hidden">
                    <h3 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-3 flex items-center gap-2">
                        <span class="material-symbols-outlined text-secondary">admin_panel_settings</span> Painel Master
                    </h3>
                    <p class="font-label-sm text-label-sm text-on-surface-variant mb-6">
                        Gerencie aprovações de novos acessos e prazos de validade da licença de 30 dias.
                    </p>
                    <a href="master.html" class="w-full btn-primary font-label-sm text-label-sm text-on-primary py-3 rounded-xl transition-transform active:scale-[0.98] flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined">group</span> Acessar Painel Master
                    </a>
                </section>
            </div>
        </div>
    </main>
    <!-- BottomNavBar (Mobile Only) -->
    <div id="bottom-nav-bar"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.env.js"></script>
    <script src="supabase.js"></script>
    <script src="navigation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const nameInput = document.getElementById('profile-name-input');
            const phoneInput = document.getElementById('profile-phone-input');
            const emailInput = document.getElementById('profile-email-input');
            const roleInput = document.getElementById('profile-role-input');
            const statusInput = document.getElementById('profile-status-input');
            const saveProfileBtn = document.getElementById('btn-save-profile');
            const masterPanelCard = document.getElementById('master-panel-card');

            // Load currently logged-in user profile
            const loggedUserRaw = localStorage.getItem('MAPAOS_LOGGED_USER');
            if (loggedUserRaw) {
                const user = JSON.parse(loggedUserRaw);
                
                if (nameInput) nameInput.value = user.name || '';
                if (phoneInput) phoneInput.value = user.phone || '';
                if (emailInput) emailInput.value = user.email || '';
                if (roleInput) roleInput.value = user.role || 'User';
                if (statusInput) statusInput.value = user.status || 'Pendente';

                // If user is Master, reveal the admin panel navigation card
                if (user.role === 'Master' && masterPanelCard) {
                    masterPanelCard.classList.remove('hidden');
                }
                
                // Set click action to update the user profile
                if (saveProfileBtn) {
                    saveProfileBtn.addEventListener('click', async () => {
                        const newName = nameInput.value.trim();
                        const newPhone = phoneInput.value.trim();
                        
                        if (!newName) {
                            alert('O campo nome não pode estar vazio.');
                            return;
                        }

                        saveProfileBtn.innerHTML = '<span class="material-symbols-outlined animate-spin text-sm">sync</span> Salvando...';
                        saveProfileBtn.disabled = true;

                        const success = await dbUpdateProfile(user.id, { name: newName, phone: newPhone });
                        
                        saveProfileBtn.innerHTML = '<span class="material-symbols-outlined text-sm">save</span> Salvar Alterações';
                        saveProfileBtn.disabled = false;

                        if (success) {
                            // Update localstorage cache
                            user.name = newName;
                            user.phone = newPhone;
                            localStorage.setItem('MAPAOS_LOGGED_USER', JSON.stringify(user));
                            alert('Perfil atualizado com sucesso!');
                        } else {
                            alert('Erro ao atualizar o perfil. Tente novamente.');
                        }
                    });
                }
            } else {
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
